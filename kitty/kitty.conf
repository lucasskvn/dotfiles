#font_family         JetBrains Mono
bold_font           auto
italic_font         auto
bold_italic_font    auto
#font_size           14

# Fallback pour les Emojis
symbol_map U+1F300-U+1F6FF,U+2600-U+26FF,U+2700-U+27BF Noto Color Emoji


font_family      JetBrainsMono NF
font_size        11.0

window_padding_width 0
confirm_os_window_close 0

include theme.conf

detect_urls yes
url_color #0087bd
url_style curly

scrollback_lines 1500
wheel_scroll_multiplier 10.0

background_opacity 1
hide_window_decorations yes
sync_to_monitor yes

enable_audio_bell no

map ctrl+shift+f send_text all clear\n cd `cdinteractive`\n
map ctrl+f send_text all fg\n

